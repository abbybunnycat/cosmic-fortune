<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日宇宙運勢占卜 - 命運的星圖</title>
    <!-- 引入 Tailwind CSS 與 Google 字型 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #070913 0%, #010205 100%);
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 閃爍星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starFlicker 60s linear infinite;
        }

        @keyframes starFlicker {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 1100px, 1400px 350px, 1250px -1080px; }
        }

        /* 3D 翻牌效果 */
        .card-container {
            perspective: 1000px;
        }

        .card-inner {
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* 牌面浮動動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-delay-1 { animation: float 6s ease-in-out infinite 1.2s; }
        .floating-delay-2 { animation: float 6s ease-in-out infinite 2.4s; }
        .floating-delay-3 { animation: float 6s ease-in-out infinite 3.6s; }
        .floating-delay-4 { animation: float 6s ease-in-out infinite 4.8s; }

        /* NASA 級星雲動態光暈 */
        .nebula-glow-pillars { filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.7)); }
        .nebula-glow-violet { filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.7)); }
        .nebula-glow-orion { filter: drop-shadow(0 0 15px rgba(244, 63, 94, 0.7)); }
        .nebula-glow-deep { filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.7)); }
        .nebula-glow-gold { filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.7)); }

        /* NASA 實照漸層疊加 */
        .nasa-bg-pillars {
            background: 
                radial-gradient(circle at 15% 15%, rgba(6, 182, 212, 0.35) 0%, transparent 55%),
                radial-gradient(circle at 85% 25%, rgba(234, 179, 8, 0.3) 0%, transparent 60%),
                radial-gradient(circle at 45% 75%, rgba(79, 70, 229, 0.3) 0%, transparent 70%),
                radial-gradient(circle at 50% 50%, #030712 0%, #010204 100%);
        }
        .nasa-bg-violet {
            background: 
                radial-gradient(circle at 35% 45%, rgba(168, 85, 247, 0.45) 0%, transparent 50%),
                radial-gradient(circle at 75% 65%, rgba(219, 39, 119, 0.35) 0%, transparent 60%),
                radial-gradient(circle at 50% 15%, rgba(124, 58, 237, 0.25) 0%, transparent 65%),
                radial-gradient(circle at 50% 50%, #030712 0%, #010204 100%);
        }
        .nasa-bg-orion {
            background: 
                radial-gradient(circle at 50% 50%, rgba(244, 63, 94, 0.45) 0%, transparent 45%),
                radial-gradient(circle at 20% 70%, rgba(6, 182, 212, 0.35) 0%, transparent 60%),
                radial-gradient(circle at 80% 30%, rgba(249, 115, 22, 0.35) 0%, transparent 60%),
                radial-gradient(circle at 50% 50%, #030712 0%, #010204 100%);
        }
        .nasa-bg-deep {
            background: 
                radial-gradient(circle at 50% 30%, rgba(56, 189, 248, 0.35) 0%, transparent 50%),
                radial-gradient(circle at 40% 70%, rgba(30, 41, 59, 0.8) 0%, transparent 70%),
                radial-gradient(circle at 50% 50%, #02040a 0%, #010103 100%);
        }
        .nasa-bg-gold {
            background: 
                radial-gradient(circle at 25% 25%, rgba(245, 158, 11, 0.35) 0%, transparent 55%),
                radial-gradient(circle at 75% 75%, rgba(139, 92, 246, 0.2) 0%, transparent 65%),
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.8) 0%, #010204 100%);
        }

        /* 局部美化滾動條 */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 999px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

        // 選擇牌面
        function selectCard(selectedIndex) {
            if (hasSelected) return;
            hasSelected = true;

            currentSelection.cardIndex = selectedIndex;
            currentSelection.theme = CARD_THEMES[selectedIndex];
            currentSelection.fortune = currentAssignedFortunes[selectedIndex];

            const wrapper = document.getElementById(`card-wrapper-${selectedIndex}`);
            const modal = document.getElementById('fortune-modal');
            const placeholder = document.getElementById('modal-card-placeholder');

            if (wrapper && placeholder && modal) {
                // 停止原卡片懸浮浮動
                wrapper.classList.remove('floating', 'floating-delay-1', 'floating-delay-2', 'floating-delay-3', 'floating-delay-4');

                // 將選中的卡片節點物理移入 Modal 遮罩容器內
                placeholder.appendChild(wrapper);

                // 顯示全螢幕神秘黑洞背景遮罩
                modal.classList.remove('opacity-0', 'pointer-events-none');

                // 執行翻牌與淡入按鈕動畫
                setTimeout(() => {
                    const selectInner = wrapper.querySelector('.card-inner');
                    if (selectInner) {
                        selectInner.classList.add('card-flipped');
                    }

                    const actionPanel = document.getElementById('modal-action-panel');
                    if (actionPanel) {
                        actionPanel.classList.remove('hidden');
                        setTimeout(() => {
                            actionPanel.classList.add('opacity-100', 'translate-y-0');
                        }, 50);
                    }
                }, 300);
            }
        }

        // 分享占卜運勢功能 (複製至剪貼簿)
        function shareFortune() {
            const textToCopy = `✨ 我的今日宇宙運勢占卜結果 ✨\n🔮 占卜卡牌：${currentSelection.theme.name}\n🌟 今日運勢：${currentSelection.fortune.luck} (${currentSelection.fortune.score})\n🌌 星軌指引：${currentSelection.fortune.description}\n⭐ 宇宙指引：${currentSelection.fortune.notice}\n快來測測你的今日宇宙運勢吧！`;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showCustomToast("運勢結果已複製到剪貼簿！快分享給朋友吧 🔗");
            } catch (err) {
                showCustomToast("複製失敗，請手動複製。");
            }
            document.body.removeChild(textArea);
        }

        // 自訂簡易 Toast 提示訊息
        function showCustomToast(message) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900 border border-cyan-500/50 text-cyan-400 font-bold px-6 py-3 rounded-full shadow-lg text-sm transition-opacity duration-300 pointer-events-none opacity-0";
            toast.innerText = message;
            document.body.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('opacity-0'); toast.classList.add('opacity-100'); }, 50);
            setTimeout(() => { 
                toast.classList.remove('opacity-100'); 
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // 重置並重新占卜
        function resetGameFromModal() {
            hasSelected = false;

            const modal = document.getElementById('fortune-modal');
            const placeholder = document.getElementById('modal-card-placeholder');
            const grid = document.getElementById('cards-grid');
            const targetIndex = currentSelection.cardIndex;
            const targetCard = document.getElementById(`card-wrapper-${targetIndex}`);

            if (modal && placeholder && grid && targetCard) {
                // 1. 關閉全螢幕遮罩
                modal.classList.add('opacity-0', 'pointer-events-none');
                
                // 2. 將翻牌狀態還原為正面的牌背
                const inner = targetCard.querySelector('.card-inner');
                if (inner) {
                    inner.classList.remove('card-flipped');
                }

                // 3. 延遲 500 毫秒將卡片插回大廳網格，並啟動全新的一局
                setTimeout(() => {
                    // 將卡片插回原本在 grid 中的正確 DOM 索引順序位置
                    const siblings = Array.from(grid.children);
                    if (targetIndex >= siblings.length) {
                        grid.appendChild(targetCard);
                    } else {
                        grid.insertBefore(targetCard, siblings[targetIndex]);
                    }

                    // 重新分派新的隨機吉凶運勢
                    prepareFortunes();

                    // 重新還原大廳的所有卡片為可顯示與浮動狀態
                    for (let i = 0; i < 5; i++) {
                        const wrapper = document.getElementById(`card-wrapper-${i}`);
                        if (wrapper) {
                            wrapper.classList.remove('hidden');
                            wrapper.style.opacity = '1';
                            wrapper.style.transform = 'scale(1)';
                            wrapper.style.pointerEvents = 'auto';
                            
                            // 重建背景懸浮浮動
                            if (i === 0) wrapper.classList.add('floating');
                            if (i === 1) wrapper.classList.add('floating-delay-1');
                            if (i === 2) wrapper.classList.add('floating-delay-2');
                            if (i === 3) wrapper.classList.add('floating-delay-3');
                            if (i === 4) wrapper.classList.add('floating-delay-4');
                        }
                    }

                    // 還原副標題
                    const subTitle = document.getElementById('sub-title');
                    if (subTitle) {
                        subTitle.innerHTML = `閉上雙眼，深呼吸三次... 傾聽星塵的耳語，<br>從五張神祕的宇宙圖卡中，選取一張屬於你的今日啟示。`;
                    }

                    // 隱藏操作面板按鈕
                    const actionPanel = document.getElementById('modal-action-panel');
                    if (actionPanel) {
                        actionPanel.classList.add('opacity-0', 'translate-y-2');
                    }
                }, 500);
            }
        }

        // 洗牌演算法
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 初始化
        window.onload = function() {
            prepareFortunes();
        };
    </script>
