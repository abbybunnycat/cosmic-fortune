<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日宇宙運勢占卜 - Cosmic Fortune</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for stars and celestial icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Cinzel:wght@400;600;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #02000a;
            overflow-x: hidden;
        }

        .font-celestial {
            font-family: 'Cinzel', serif;
        }

        /* 縮放與漸變背景動畫 */
        @keyframes spaceGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .galaxy-bg {
            background: radial-gradient(circle at 50% 50%, #0c0721 0%, #02000a 100%);
            background-size: 200% 200%;
            animation: spaceGlow 20s ease infinite;
        }

        /* 穩定閃爍星星背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.1) 1.5px, transparent 40px);
            background-size: 300px 300px, 150px 150px;
            background-repeat: repeat;
            opacity: 0.4;
            z-index: 0;
        }

        /* 旋轉星軌效果 */
        .nebula {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 650px;
            height: 650px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(6, 182, 212, 0.04) 50%, transparent 70%);
            transform: translate(-50%, -50%);
            filter: blur(60px);
            pointer-events: none;
            animation: rotateNebula 50s linear infinite;
            z-index: 0;
        }

        @keyframes rotateNebula {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 牌卡 3D 翻轉與物理 */
        .card-container {
            perspective: 1200px;
        }

        .card-inner {
            transition: transform 0.85s cubic-bezier(0.2, 0.8, 0.2, 1.15);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Flipped 狀態：旋轉 180 度顯示正面 */
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-cover, .card-face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.25rem;
            overflow: hidden;
        }

        /* 初始狀態：Cover 面朝玩家 (0度) */
        .card-cover {
            transform: rotateY(0deg);
            z-index: 2;
        }

        /* 初始狀態：Face 面朝後方 (180度) */
        .card-face {
            transform: rotateY(180deg);
            z-index: 1;
        }

        /* 頂級外框發光呼吸燈 */
        @keyframes goldGlow {
            0%, 100% { border-color: rgba(245, 158, 11, 0.25); box-shadow: 0 0 15px rgba(245, 158, 11, 0.1); }
            50% { border-color: rgba(245, 158, 11, 0.55); box-shadow: 0 0 25px rgba(245, 158, 11, 0.25); }
        }

        .gold-border-glow {
            animation: goldGlow 5s infinite ease-in-out;
        }

        /* 牌卡懸停微調 (優雅浮動，絕不造成版面震動) */
        .hover-lift {
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        }
        @media (hover: hover) {
            .hover-lift:hover {
                transform: translateY(-8px) scale(1.03);
                box-shadow: 0 20px 35px rgba(0, 0, 0, 0.8);
            }
        }

        /* 牌卡間歇式神秘幽雅漂浮 */
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        .float-0 { animation: gentleFloat 6s ease-in-out infinite; }
        .float-1 { animation: gentleFloat 6.5s ease-in-out infinite 0.7s; }
        .float-2 { animation: gentleFloat 5.8s ease-in-out infinite 1.4s; }
        .float-3 { animation: gentleFloat 6.2s ease-in-out infinite 2.1s; }
        .float-4 { animation: gentleFloat 7s ease-in-out infinite 2.8s; }
    </style>
</head>
<body class="galaxy-bg min-h-screen text-gray-100 flex flex-col justify-between relative overflow-y-auto px-4 py-8 md:p-12 selection:bg-purple-500/30 selection:text-white">
    
    <!-- 穩定的背景特效 -->
    <div class="stars"></div>
    <div class="nebula"></div>

    <!-- 頂部標題區 -->
    <header class="text-center z-10 max-w-2xl mx-auto mb-6 transition-all duration-700" id="gameHeader">
        <h1 class="font-celestial text-3xl md:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-300 via-amber-200 to-cyan-300 drop-shadow-[0_4px_12px_rgba(168,85,247,0.35)]">
            今日宇宙運勢占卜
        </h1>
        <p class="text-[10px] md:text-xs text-amber-200/80 mt-3 tracking-[0.3em] font-celestial uppercase">
            — THE COSMIC REVELATION —
        </p>
        <p class="text-sm md:text-base text-purple-200/90 mt-5 max-w-md mx-auto leading-relaxed font-light" id="gameSubtitle">
            澄淨思緒，凝望繁星。<br>憑直覺點選一張與你當下靈魂共鳴的星譜牌卡...
        </p>
    </header>

    <!-- 占卜主舞台 -->
    <main class="w-full max-w-6xl mx-auto my-auto z-10 flex flex-col items-center justify-center min-h-[500px]">
        <!-- 5張牌卡展示區域 -->
        <div id="cardsStage" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5 md:gap-7 w-full justify-center transition-all duration-1000 py-6">
            <!-- 牌卡將透過 JS 動態生成 -->
        </div>

        <!-- 占卜結果詳細呈現區域 (預設隱藏) -->
        <div id="resultStage" class="hidden w-full max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-center gap-8 md:gap-14 py-4 opacity-0 transition-all duration-1000">
            <!-- 放大後的被選中牌卡 -->
            <div id="selectedCardPlaceholder" class="w-[240px] h-[380px] md:w-[280px] md:h-[440px] shrink-0">
                <!-- 牌卡會被克隆到這裡 -->
            </div>

            <!-- 詳細命理說明 -->
            <div class="flex-grow w-full md:w-auto bg-black/45 backdrop-blur-2xl border border-white/10 rounded-3xl p-6 md:p-8 shadow-[0_0_50px_rgba(0,0,0,0.8)] relative overflow-hidden flex flex-col justify-between">
                <!-- 精美背景裝飾 -->
                <div class="absolute -top-12 -right-12 w-32 h-32 bg-purple-500/10 rounded-full blur-2xl"></div>
                <div class="absolute -bottom-12 -left-12 w-32 h-32 bg-cyan-500/10 rounded-full blur-2xl"></div>

                <div>
                    <!-- 卡片名稱 -->
                    <div class="flex items-center gap-3 mb-2">
                        <span id="resultCardType" class="text-[11px] font-semibold tracking-wider px-3 py-1 rounded-full text-white">
                            <!-- 牌卡元素屬性 -->
                        </span>
                        <h3 id="resultCardName" class="text-xl md:text-2xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-100 to-gray-300 font-celestial">
                            <!-- 牌卡名稱 -->
                        </h3>
                    </div>

                    <!-- 今日吉凶 -->
                    <div class="flex items-baseline gap-2 mb-6 border-b border-white/10 pb-4">
                        <span class="text-xs text-purple-300/70 font-light">今日星曆引力：</span>
                        <span id="resultFortune" class="text-2xl md:text-3xl font-black tracking-widest">
                            <!-- 今日吉凶 -->
                        </span>
                    </div>

                    <!-- 詳細解說 -->
                    <div class="space-y-5 text-gray-200 text-sm md:text-base leading-relaxed mb-6">
                        <div>
                            <h4 class="text-xs text-purple-300 font-semibold tracking-widest mb-1.5 flex items-center gap-1.5">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> 星際能量分析
                            </h4>
                            <p id="resultDescription" class="font-light pl-4 border-l border-purple-500/30 text-gray-300 text-justify">
                                <!-- 詳細解說內容 -->
                            </p>
                        </div>
                        <div>
                            <h4 class="text-xs text-cyan-300 font-semibold tracking-widest mb-1.5 flex items-center gap-1.5">
                                <i class="fa-solid fa-compass"></i> 宇宙指引方針
                            </h4>
                            <p id="resultGuidance" class="text-amber-100/90 italic font-medium pl-4 border-l border-cyan-500/30 text-justify">
                                <!-- 宇宙指引內容 -->
                            </p>
                        </div>
                    </div>
                </div>

                <!-- 底部按鈕區 -->
                <div class="flex flex-wrap gap-4 pt-4 border-t border-white/10 mt-auto">
                    <button onclick="shareFortune()" class="flex-1 min-w-[130px] bg-gradient-to-r from-purple-600/90 to-indigo-600/90 hover:from-purple-500 hover:to-indigo-500 text-white font-medium text-sm py-3 px-4 rounded-xl transition duration-300 shadow-lg shadow-purple-900/30 flex items-center justify-center gap-2 border border-purple-500/30">
                        <i class="fa-solid fa-share-nodes text-xs"></i> 分享今日星啟
                    </button>
                    <button onclick="restartDivination()" class="flex-1 min-w-[130px] bg-white/5 hover:bg-white/15 text-white border border-white/15 font-medium text-sm py-3 px-4 rounded-xl transition duration-300 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-rotate-right text-xs"></i> 重啟星軌連結
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- 吐司通知 (複製成功等提示) -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-950/95 backdrop-blur-md border border-amber-500/30 text-amber-100 px-6 py-3.5 rounded-full text-xs md:text-sm font-medium tracking-widest shadow-[0_10px_30px_rgba(0,0,0,0.8)] transition-all duration-500 opacity-0 pointer-events-none z-50 flex items-center gap-2.5">
        <i class="fa-solid fa-circle-check text-emerald-400"></i> <span id="toastMsg">連結複製成功！</span>
    </div>

    <!-- 底部資訊欄 -->
    <footer class="text-center z-10 text-[10px] text-gray-600 mt-8 tracking-widest font-light font-celestial">
        <p>© 2026 COSMIC DIAL. LISTEN TO THE SILENT STARS & ALIGN YOUR GRAVITY.</p>
    </footer>

    <script>
        // --- 1. 遊戲資料池定義 ---
        const CARD_THEMES = [
            {
                id: 'purple',
                colorClass: 'from-purple-950 via-slate-950 to-violet-950',
                borderGlow: 'border-purple-500/40 hover:border-purple-400',
                themeName: '星雲紫',
                elementName: '【星雲幻境 - 精神與直覺】',
                labelColor: 'bg-purple-600/80 border border-purple-400/30',
                svgColor: '#c084fc',
                accentColor: 'shadow-[0_0_20px_rgba(168,85,247,0.4)]'
            },
            {
                id: 'blue',
                colorClass: 'from-blue-950 via-slate-950 to-cyan-950',
                borderGlow: 'border-cyan-500/40 hover:border-cyan-400',
                themeName: '極光藍',
                elementName: '【極光之海 - 智慧與理性】',
                labelColor: 'bg-cyan-600/80 border border-cyan-400/30',
                svgColor: '#22d3ee',
                accentColor: 'shadow-[0_0_20px_rgba(6,182,212,0.4)]'
            },
            {
                id: 'gold',
                colorClass: 'from-amber-950 via-slate-950 to-yellow-950',
                borderGlow: 'border-amber-500/40 hover:border-amber-400',
                themeName: '恆星金',
                elementName: '【恆星核心 - 意志與行動】',
                labelColor: 'bg-amber-600/80 border border-amber-400/30',
                svgColor: '#fbbf24',
                accentColor: 'shadow-[0_0_20px_rgba(245,158,11,0.4)]'
            },
            {
                id: 'red',
                colorClass: 'from-rose-950 via-slate-950 to-red-950',
                borderGlow: 'border-rose-500/40 hover:border-rose-400',
                themeName: '超新星紅',
                elementName: '【星爆裂隙 - 激情與重塑】',
                labelColor: 'bg-rose-600/80 border border-rose-400/30',
                svgColor: '#fb7185',
                accentColor: 'shadow-[0_0_20px_rgba(244,63,94,0.4)]'
            },
            {
                id: 'teal',
                colorClass: 'from-emerald-950 via-slate-950 to-teal-950',
                borderGlow: 'border-teal-500/40 hover:border-teal-400',
                themeName: '星塵綠',
                elementName: '【星塵溫床 - 復甦與療癒】',
                labelColor: 'bg-teal-600/80 border border-teal-400/30',
                svgColor: '#2dd4bf',
                accentColor: 'shadow-[0_0_20px_rgba(45,212,191,0.4)]'
            }
        ];

        const CARD_NAMES = [
            "仙女座的凝望 (Andromeda)", 
            "黑洞的奇異點 (Singularity)", 
            "獵戶座的星盾 (Orion's Shield)", 
            "雙子星的共振 (Binary Stars)", 
            "銀河系之風暴 (Galactic Storm)",
            "昴宿星團的光雨 (Pleiades Shower)",
            "織女星的引力弦 (Vega's String)",
            "木星的巨紅斑 (Jupiter's Eye)",
            "暗物質的編織者 (Dark Matter Web)"
        ];

        const FORTUNE_LEVELS = [
            { level: "極光耀頂【超大吉】", color: "text-amber-300 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]" },
            { level: "繁星隨行【大吉】", color: "text-yellow-200 drop-shadow-[0_0_6px_rgba(253,224,71,0.4)]" },
            { level: "微光照拂【吉】", color: "text-purple-300" },
            { level: "星塵飛揚【小吉】", color: "text-cyan-300" },
            { level: "星軌平順【平】", color: "text-gray-300" },
            { level: "重力湧動【磨練】", color: "text-rose-400" }
        ];

        const ASTRO_READINGS = [
            {
                desc: "今日你的能量場與高維度星際網絡完美契合。直覺力敏銳得如同雷達，身邊似乎有隱形的引力將好運推向你。那些困擾已久的懸案，在今天極易迎來靈光乍現的突破，甚至是命運軌道的重新校準。",
                guide: "「勇敢地伸出觸角去感知世界，今日宇宙正全神貫注地聆聽你的祈願。」"
            },
            {
                desc: "目前的你正處於一個星體重組的過渡期。某些舊有的、不再適合你靈魂成長的連結正在慢慢消融。這不是失去，而是宇宙在為即將到來的全新能量風暴騰出空間，保持身心放鬆即可。",
                guide: "「別害怕黑暗，那是星辰誕生前的唯一序曲。」"
            },
            {
                desc: "今日你將獲得如恆星般穩定的支援能量。適合開啟有計畫性的工作，你的專注力與執行力正處於軌道波峰。周圍的人將被你溫暖而堅定的氣場吸引，這也是建立深度信任與合作的絕佳時機。",
                guide: "「向外播撒你的光，但記得保持核心燃燒的純粹。」"
            },
            {
                desc: "波瀾起伏的宇宙引力正在衝擊你的星盤。今天可能會有一些突發事件或意料之外的變動挑戰你的適應力。這是一個信號，說明你現有的常規需要打破，一場絢爛的『超新星爆發』正等待你在混亂中重生。",
                guide: "「當風暴改變了地平線，便是展翅飛向新星域的時刻。」"
            },
            {
                desc: "今日星光溫和，能量溫潤地包裹著你。這是一個絕佳的『自我修復』日，不宜過度奔忙。將注意力收回到自己身上，聆聽內心的潮汐波動，泡一盞茶、讀一本書，或者僅僅是靜坐呼吸，都是在與宇宙同頻。",
                guide: "「在無邊的寂靜中，你會聽見群星對你細語的愛意。」"
            },
            {
                desc: "雙子星軌道的交匯，暗示今日人際交往將成為你的能量放大器。一場與朋友的深度對話，或者偶遇的一位陌生人，都可能為你帶來至關重要的命運啟示。試著保持開放與好奇，宇宙正透過他人對你說話。",
                guide: "「每個與你擦肩而過的靈魂，都是天際劃過的一顆流星，皆有深意。」"
            }
        ];

        // 儲存當前產生的 5 張卡片的內定運勢，杜絕「載入中」
        let generatedCardsData = [];
        let selectedIndexGlobal = null;
        let isDivining = false;

        window.onload = function() {
            generateCards();
        };

        // --- 2. 核心：生成牌卡且「預先設定好命運數據」 ---
        function generateCards() {
            const container = document.getElementById('cardsStage');
            container.innerHTML = '';
            generatedCardsData = []; // 清空數據
            
            // 隨機打亂卡片主題陣列
            const shuffledThemes = [...CARD_THEMES].sort(() => Math.random() - 0.5);
            
            shuffledThemes.forEach((theme, index) => {
                // 為每一張卡預先指定好隨機名稱、吉凶、與解說
                const randomName = CARD_NAMES[Math.floor(Math.random() * CARD_NAMES.length)];
                const randomFortune = FORTUNE_LEVELS[Math.floor(Math.random() * FORTUNE_LEVELS.length)];
                const randomReading = ASTRO_READINGS[Math.floor(Math.random() * ASTRO_READINGS.length)];

                // 寫入本地資料庫
                generatedCardsData.push({
                    index: index,
                    theme: theme,
                    cardName: randomName,
                    fortune: randomFortune,
                    desc: randomReading.desc,
                    guide: randomReading.guide
                });

                // 動態生成帶有「3D Cover/Face 正確對立」與「預載內容」的牌卡 HTML
                const cardHTML = `
                    <div class="card-container hover-lift float-${index} w-full aspect-[10/16] cursor-pointer" 
                         id="card-${index}" 
                         onclick="selectCard(${index})">
                        <div class="card-inner">
                            
                            <!-- 1. 卡片背面 (Cover) - 網頁剛載入時，直接顯示這面 -->
                            <div class="card-cover bg-gradient-to-br ${theme.colorClass} border border-white/10 ${theme.accentColor} p-4 flex flex-col justify-between items-center shadow-2xl gold-border-glow">
                                <div class="w-full flex justify-between text-[9px] text-gray-500 tracking-wider">
                                    <span class="font-celestial">COSMIC</span>
                                    <span>N°0${index+1}</span>
                                </div>
                                
                                <!-- 背面極致神祕星盤 (Astrolabe 幾何 SVG) -->
                                <div class="w-24 h-24 md:w-28 md:h-28 my-auto relative flex items-center justify-center">
                                    <svg class="absolute animate-[spin_80s_linear_infinite] w-full h-full opacity-45" viewBox="0 0 100 100">
                                        <!-- 外圈刻度與符號 -->
                                        <circle cx="50" cy="50" r="46" fill="none" stroke="${theme.svgColor}" stroke-width="1.2" stroke-dasharray="2, 2"/>
                                        <circle cx="50" cy="50" r="41" fill="none" stroke="${theme.svgColor}" stroke-width="0.5"/>
                                        <!-- 中圈天體軌道 -->
                                        <circle cx="50" cy="50" r="32" fill="none" stroke="${theme.svgColor}" stroke-width="0.8" stroke-dasharray="6, 3"/>
                                        <circle cx="38" cy="50" r="20" fill="none" stroke="${theme.svgColor}" stroke-width="0.5" opacity="0.5"/>
                                        <!-- 八向經緯度光芒 -->
                                        <line x1="50" y1="4" x2="50" y2="96" stroke="${theme.svgColor}" stroke-width="0.4" opacity="0.6"/>
                                        <line x1="4" y1="50" x2="96" y2="50" stroke="${theme.svgColor}" stroke-width="0.4" opacity="0.6"/>
                                        <line x1="18" y1="18" x2="82" y2="82" stroke="${theme.svgColor}" stroke-width="0.3" stroke-dasharray="2,2" opacity="0.4"/>
                                        <line x1="18" y1="82" x2="82" y2="18" stroke="${theme.svgColor}" stroke-width="0.3" stroke-dasharray="2,2" opacity="0.4"/>
                                    </svg>
                                    <!-- 內核星芒 -->
                                    <svg class="absolute animate-[spin_25s_linear_infinite_reverse] w-12 h-12" viewBox="0 0 100 100">
                                        <polygon points="50,0 60,35 95,35 68,57 78,95 50,72 22,95 32,57 5,35 40,35" fill="none" stroke="${theme.svgColor}" stroke-width="1.5" />
                                    </svg>
                                    <div class="z-10">
                                        <i class="fa-solid fa-bahai text-lg opacity-95" style="color: ${theme.svgColor}"></i>
                                    </div>
                                </div>

                                <div class="text-center w-full">
                                    <span class="text-[10px] md:text-xs font-semibold tracking-[0.25em] text-amber-200/90 drop-shadow-md">啟動星軌</span>
                                    <div class="w-8 h-[1px] mx-auto mt-2" style="background: ${theme.svgColor}; opacity:0.6;"></div>
                                </div>
                            </div>

                            <!-- 2. 卡片正面 (Face) - 點擊後翻開呈現 (預設預載好，不顯示載入中) -->
                            <div class="card-face bg-gradient-to-b ${theme.colorClass} border border-white/20 p-4 flex flex-col justify-between items-center shadow-2xl">
                                <div class="w-full flex justify-between text-[9px] text-gray-300 opacity-80">
                                    <span class="font-celestial">${theme.themeName}</span>
                                    <i class="fa-solid fa-sparkles" style="color: ${theme.svgColor}"></i>
                                </div>

                                <!-- 正面：星象核心圖案 -->
                                <div class="w-20 h-20 my-auto relative flex items-center justify-center">
                                    <svg class="absolute animate-[spin_50s_linear_infinite]" width="75" height="75" viewBox="0 0 100 100">
                                        <polygon points="50,5 88,27 88,73 50,95 12,73 12,27" fill="none" stroke="${theme.svgColor}" stroke-width="1.2" stroke-dasharray="3,1" />
                                        <circle cx="50" cy="50" r="22" fill="none" stroke="${theme.svgColor}" stroke-width="1.2" />
                                    </svg>
                                    <!-- 星體斑斕核心點 -->
                                    <div class="w-4 h-4 rounded-full absolute shadow-[0_0_15px_#fff]" style="background-color: ${theme.svgColor}; opacity: 0.85;"></div>
                                </div>

                                <div class="text-center w-full overflow-hidden">
                                    <p class="text-[8px] text-purple-300/60 tracking-widest font-celestial">STAR SPECTRUM</p>
                                    <p class="text-[11px] font-bold tracking-wide mt-1 text-white truncate px-1">
                                        ${randomName.split(' ')[0]}
                                    </p>
                                </div>
                            </div>

                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // --- 3. 翻牌占卜流 ---
        function selectCard(selectedIndex) {
            if (isDivining) return;
            isDivining = true;
            selectedIndexGlobal = selectedIndex;

            // 取得該牌面預載好的運勢數據
            const data = generatedCardsData[selectedIndex];

            // 1. 觸發翻牌 (加入 flipped 樣式，翻轉 180 度)
            const selectedCardContainer = document.getElementById(`card-${selectedIndex}`);
            selectedCardContainer.classList.add('flipped');

            // 2. 其他牌卡慢慢淡出並往中心收縮 (防版面震動與跳動)
            setTimeout(() => {
                const containers = document.querySelectorAll('.card-container');
                containers.forEach((container, idx) => {
                    if (idx !== selectedIndex) {
                        container.style.transform = 'scale(0.1) rotate(15deg)';
                        container.style.opacity = '0';
                        container.style.pointerEvents = 'none';
                        container.style.transition = 'all 750ms cubic-bezier(0.6, -0.2, 0.7, 0.1)';
                    }
                });
            }, 250);

            // 3. 展開結果主面板
            setTimeout(() => {
                // 收合原舞台
                const cardsStage = document.getElementById('cardsStage');
                cardsStage.classList.add('hidden');

                // 複製已經完全翻轉的牌卡至結果插槽
                const clone = selectedCardContainer.cloneNode(true);
                clone.id = "clonedSelectedCard";
                // 移除外層動畫與懸停抖動，使其安穩展示
                clone.className = "w-full h-full relative cursor-default";
                
                // 鎖定 3D 翻轉角度，確保百分之百顯示正面
                const inner = clone.querySelector('.card-inner');
                if (inner) {
                    inner.style.transform = 'rotateY(180deg)';
                }

                const placeholder = document.getElementById('selectedCardPlaceholder');
                placeholder.innerHTML = '';
                placeholder.appendChild(clone);

                // 更新詳細命理解析文字
                const resultCardType = document.getElementById('resultCardType');
                resultCardType.textContent = data.theme.elementName;
                resultCardType.className = `text-[11px] font-semibold tracking-wider px-3 py-1 rounded-full text-white ${data.theme.labelColor}`;

                document.getElementById('resultCardName').textContent = data.cardName;
                
                const fortuneEl = document.getElementById('resultFortune');
                fortuneEl.textContent = data.fortune.level;
                fortuneEl.className = `text-2xl md:text-3xl font-extrabold tracking-widest ${data.fortune.color}`;

                document.getElementById('resultDescription').textContent = data.desc;
                document.getElementById('resultGuidance').textContent = data.guide;

                // 呈現結果看板
                const resultStage = document.getElementById('resultStage');
                resultStage.classList.remove('hidden');
                
                // 更動副標題
                document.getElementById('gameSubtitle').innerHTML = "星軌已定，這便是今日宇宙為你編織的專屬星系啟示。";

                setTimeout(() => {
                    resultStage.classList.add('opacity-100');
                }, 50);

            }, 1100);
        }

        // --- 4. 按鈕功能 ---

        // 重啟占卜
        function restartDivination() {
            const resultStage = document.getElementById('resultStage');
            resultStage.classList.remove('opacity-100');
            resultStage.classList.add('opacity-0');

            setTimeout(() => {
                resultStage.classList.add('hidden');
                
                const cardsStage = document.getElementById('cardsStage');
                cardsStage.classList.remove('hidden');
                
                document.getElementById('gameSubtitle').innerHTML = `澄淨思緒，凝望繁星。<br>憑直覺點選一張與你當下靈魂共鳴的星譜牌卡...`;

                // 重新渲染整批星牌
                generateCards();
                isDivining = false;
            }, 600);
        }

        // 分享運勢 (安全複製機制)
        function shareFortune() {
            if (selectedIndexGlobal === null) return;
            const data = generatedCardsData[selectedIndexGlobal];

            const shareText = `✨【今日宇宙運勢占卜】✨
--------------------------------
🔮 啟動星盤：${data.cardName}
🎨 星軌屬性：${data.theme.themeName} ${data.theme.elementName}
🌟 今日運勢：${data.fortune.level}

🌌 [星際能量分析]
${data.desc}

🧭 [宇宙指引方針]
${data.guide}

--------------------------------
🌌 聆聽星斗細語，順應宇宙引力 🌌`;

            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = shareText;
            tempTextArea.style.position = "fixed"; 
            document.body.appendChild(tempTextArea);
            tempTextArea.focus();
            tempTextArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast("✨ 占卜啟示已複製至剪貼簿，去分享給朋友吧！");
                } else {
                    showToast("❌ 複製失敗，請手動圈選文字複製。");
                }
            } catch (err) {
                showToast("❌ 複製失敗，瀏覽器尚未支援。");
            }

            document.body.removeChild(tempTextArea);
        }

        // 自訂 Toast 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = msg;
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');

            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3200);
        }
    </script>
</body>
</html>
